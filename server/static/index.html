<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alice</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&family=Cinzel+Decorative:wght@400&family=Pinyon+Script&family=Share+Tech+Mono&family=Almendra:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
<header>
  <h1>ALICE</h1>
  <button class="cb stop-btn" id="stop-btn" onclick="interrupt('user')" title="Stop (Esc)">Stop</button>
  <div style="display:flex;gap:.6rem;align-items:center">
    <select id="model-select" class="cb" onchange="switchModel(this)" style="cursor:pointer;max-width:16rem"></select>
    <select id="persona-select" class="cb" onchange="switchPersona(this.value)" style="cursor:pointer"></select>
    <button class="cb" id="skip-btn" onclick="skipVoice()" disabled>Skip</button>
    <button class="cb" id="mute-btn" onclick="toggleMute()">Mute</button>
    <select id="demo-persona-select" class="cb" onchange="switchDemoPersona(this.value)" title="Your character in demo mode" style="cursor:pointer"></select>
    <button class="cb" id="demo-btn" onclick="toggleDemo()" title="Auto-pilot: Alice generates and responds to her own prompts">Demo</button>
    <button class="cb" onclick="exportHistory()" title="Export conversation as text">Export</button>
    <button class="cb" onclick="clearHistory()">Clear</button>
    <span id="ctx-meter" style="font-size:.7rem;color:#888;min-width:3rem;text-align:right" title="Context usage"></span>
  </div>
</header>
<div class="main">
  <div class="cp">
    <div id="thinking-bar"></div>
    <div class="msgs" id="msgs">
      <div class="msg alice"><div class="sndr">Alice</div>Hello. I&#39;ve been waiting for you...</div>
    </div>
    <div class="ir">
      <input type="text" id="inp" placeholder="Say something... or /image" onkeydown="if(event.key==='Enter')send()">
      <button id="mic-btn" onclick="toggleMic()" title="Click to record, click again to stop">Mic</button><select id="mic-select" title="Audio input device"></select>
      <button id="ibtn" onclick="doImage()">Image</button>
    </div>
  </div>
  <div class="ip">
    <div class="ih">
      <span id="ih">Generated Scene</span>
      <div style="display:flex;gap:.4rem;align-items:center">
        <button id="seed-btn" class="pd-toggle" onclick="toggleSeedPin()" title="Pin seed for face consistency">&#128274;</button>
        <button id="reroll-btn" class="pd-toggle" onclick="reroll()" title="Re-roll: same prompt, new seed" disabled>&#8635;</button>
        <button class="pd-toggle" onclick="clearImageHistory()" title="Clear image history" style="font-size:.6rem">Clear</button>
        <button id="pd-toggle" class="pd-toggle" onclick="togglePromptPanel()" title="Toggle prompt editor">+</button>
      </div>
    </div>
    <div class="ic-wrap">
      <div class="ic" id="ic"><div class="ph">Awaiting your conversation...</div></div>
      <div class="is" id="is"></div>
    </div>
    <div class="pd" id="pd-wrap" style="display:none">
      <textarea id="pd" rows="3"></textarea>
      <div class="sliders">
        <label>Steps <span id="steps-val">25</span>
          <input type="range" id="steps" min="10" max="60" value="25" oninput="document.getElementById('steps-val').textContent=this.value">
        </label>
        <label>CFG <span id="cfg-val">7</span>
          <input type="range" id="cfg" min="1" max="20" value="7" step="0.5" oninput="document.getElementById('cfg-val').textContent=this.value">
        </label>
      </div>
      <button onclick="regenFromPrompt()">Regenerate</button>
      <details id="neg-details" style="margin-top:.4rem">
        <summary style="cursor:pointer;font-size:.75rem;color:#888">Negative prompt</summary>
        <div id="neg-prompt" style="font-size:.7rem;color:#777;margin-top:.3rem;word-break:break-word"></div>
      </details>
    </div>
  </div>
</div>
<div id="fullscreen-overlay" onclick="closeFullscreen()">
  <img id="fullscreen-img" alt="">
</div>
<script src="/static/app.js?v=9"></script>
</body>
</html>
