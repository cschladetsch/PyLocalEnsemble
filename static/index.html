<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alice</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>Alice</h1>
  <button class="cb stop-btn" id="stop-btn" onclick="interrupt('user')" disabled title="Stop (Esc)">Stop</button>
  <div style="display:flex;gap:.6rem;align-items:center">
    <select id="model-select" class="cb" onchange="switchModel(this)" style="cursor:pointer;max-width:16rem"></select>
    <select id="persona-select" class="cb" onchange="switchPersona(this.value)" style="cursor:pointer"></select>
    <button class="cb" id="resay-btn" onclick="resay()" disabled>Re-say</button>
    <button class="cb" id="mute-btn" onclick="toggleMute()">Mute</button>
    <button class="cb" onclick="clearHistory()">Clear</button>
  </div>
</header>
<div class="main">
  <div class="cp">
    <div class="msgs" id="msgs">
      <div class="msg alice"><div class="sndr">Alice</div>Hello. I&#39;ve been waiting for you...</div>
    </div>
    <div class="ir">
      <input type="text" id="inp" placeholder="Say something... or /image or /video" onkeydown="if(event.key==='Enter')send()">
      <button id="vbtn" onclick="doVideo()">Video</button>
      <button id="ibtn" onclick="doImage()">Image</button>
      <button id="btn" onclick="send()">Send</button>
    </div>
  </div>
  <div class="ip">
    <div class="ih">
      <span id="ih">Generated Scene</span>
      <button id="pd-toggle" class="pd-toggle" onclick="togglePromptPanel()" title="Toggle prompt editor">+</button>
    </div>
    <div class="ic" id="ic"><div class="ph">Awaiting your conversation...</div></div>
    <div class="pd" id="pd-wrap" style="display:none">
      <textarea id="pd" rows="3"></textarea>
      <div class="sliders">
        <label>Steps <span id="steps-val">25</span>
          <input type="range" id="steps" min="10" max="60" value="25" oninput="document.getElementById('steps-val').textContent=this.value">
        </label>
        <label>CFG <span id="cfg-val">7</span>
          <input type="range" id="cfg" min="1" max="20" value="7" step="0.5" oninput="document.getElementById('cfg-val').textContent=this.value">
        </label>
      </div>
      <button onclick="regenFromPrompt()">Regenerate</button>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
